project:
  name: whale
  version: "2.0.0"

paths:
  bin_dir: "bin"
  sh_dir: "sh"
  data_dir: "data"
  tmp_dir: "data/tmp"
  user_agents: "data/user_agents.txt"

engine:
  workers: 10               # goroutine worker pool size for the crawler
  max_depth: 3              # maximum crawl depth from seed URL
  ua_rotation: true         # rotate User-Agent per request (uses data/user_agents.txt)
  timeout_seconds: 30       # per-request HTTP timeout inside the Go engine

scan:
  default_rps: 10           # requests-per-second throttle
  timeout_seconds: 300      # hard wall-clock timeout for the full scan job
  max_depth: 3              # crawl depth (also passed to engine config)
  severity_filter:          # only report these severity levels
    - critical
    - high
    - medium
    - low
    - info

fuzzer:
  payload_categories:       # corpus categories to fuzz during scan
    - sqli
    - xss
    - ssti
    - ssrf
    - xxe
    - idor
  transforms:               # default transform ordering (WAF-specific chains take precedence)
    - url_encode
    - double_url_encode
    - unicode_escape
    - case_shuffle
    - comment_inject
    - null_byte

stealth:
  cooldown_threshold: 5     # consecutive 403/429 before cooldown triggers
  cooldown_seconds: 30      # seconds to pause when cooldown fires
  rotate_user_agents: true

reporting:
  formats:
    - html
    - json
  output_dir: "reports"
  pdf_enabled: false        # requires weasyprint; toggled on if available

logging:
  level: "INFO"
  file: "data/tmp/whale.log"

profiles:
  full:
    severity_filter: ["critical", "high", "medium", "low", "info"]
    rps: 20
  fast:
    severity_filter: ["critical", "high"]
    rps: 50
  stealth:
    severity_filter: ["critical", "high"]
    rps: 2
