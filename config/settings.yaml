project:
  name: whale
  version: "2.0.0"

paths:
  bin_dir: "bin"
  sh_dir: "sh"
  data_dir: "data"
  tmp_dir: "data/tmp"
  user_agents: "data/user_agents.txt"

engine:
  workers: 5          # reduced for maximum stealth
  max_depth: 3
  ua_rotation: true
  timeout_seconds: 10      # increased for slower responses

scan:
  default_rps: 2           # extremely conservative for sensitive targets
  timeout_seconds: 600
  max_depth: 3
  severity_filter:
    - critical
    - high
    - medium
    - low
    - info

fuzzer:
  payload_categories:
    - sqli
    - xss
    - ssti
    - ssrf
    - xxe
    - idor
  transforms:
    - url_encode
    - double_url_encode
    - unicode_escape
    - case_shuffle
    - comment_inject
    - null_byte

oast:
  domain: "bluewhale-oast.com"
  public_ip: "127.0.0.1"
  dns_port: 1053
  http_port: 1080

stealth:
  cooldown_threshold: 3
  cooldown_seconds: 60
  rotate_user_agents: true
  jitter: true
  proxies: []

reporting:
  formats:
    - json
  output_dir: "reports"
  pdf_enabled: false        # requires weasyprint; toggled on if available

logging:
  level: "INFO"
  file: "data/tmp/whale.log"

profiles:
  full:
    severity_filter: ["critical", "high", "medium", "low", "info"]
    rps: 50
  fast:
    severity_filter: ["critical", "high"]
    rps: 100
  aggressive:
    severity_filter: ["critical", "high", "medium"]
    rps: 200
  stealth:
    severity_filter: ["critical", "high"]
    rps: 5
