id: sqli-basic
name: Basic SQL Injection
severity: high
tech: ["mysql", "postgres", "sqlite"]
requests:
  - method: GET
    payloads:
      - "'"
      - "\""
      - "' OR '1'='1"
    matchers:
      - part: body
        words:
          - "SQL syntax"
          - "mysql_fetch"
          - "PostgreSQL query failed"
